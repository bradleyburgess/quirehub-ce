{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% if debug %}
      <link rel="stylesheet" href="{% static 'assets/css/styles.css' %}?ver={% now 'U' %}" />
    {% else %}
      <link rel="stylesheet" href="{% static 'assets/css/styles.css' %}" />
    {% endif %}
    <title>
      {% block title %}
        QuireHub
      {% endblock %}
    </title>
    <script type="module" src="{% static 'assets/js/head.js' %}"></script>
  </head>
  <body>
    {% comment %}Messages{% endcomment %}
    {% if messages %}
      <div class="messages-wrapper container-fluid">
        {% for message in messages %}
          <div class="one-column-centered alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      </div>
    {% endif %}
    {% comment %}/Messages{% endcomment %}

    {% block body %}

    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <script src="{% static 'assets/js/main.js' %}" type="module"></script>
  </body>
</html>
